name: oss-checks

# Thin caller of the org-wide reusable workflow at
# promptLM/.github/.github/workflows/oss-checks.yml. Keeping the gitleaks
# install + license-eye plumbing in the org repo means a CLI version bump
# (or a tooling swap) is one org PR rather than a per-repo sweep.
#
# License-header check is ON: every Java file under client-sdk-java/ carries
# the Apache-2.0 header today. When the Python and TS SDKs land they must
# carry the same header (the patterns in .licenserc.yaml already cover
# .py/.ts/.tsx).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  run:
    uses: promptLM/.github/.github/workflows/oss-checks.yml@main
    with:
      check-license-headers: true
