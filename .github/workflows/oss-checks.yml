name: OSS Checks

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    # We install the gitleaks CLI directly instead of using
    # gitleaks/gitleaks-action@v2 — that wrapper requires a commercial
    # GITLEAKS_LICENSE secret for org repos. The underlying CLI remains
    # MIT-licensed and free.
    env:
      GITLEAKS_VERSION: "8.21.2"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        run: |
          gitleaks detect \
            --config .gitleaks.toml \
            --no-banner \
            --redact \
            --verbose \
            --exit-code 1

  license-eye:
    name: license-eye (header check)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check license headers
        uses: apache/skywalking-eyes/header@main
        with:
          config: .licenserc.yaml
          mode: check
